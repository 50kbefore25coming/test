# ====== SERVER CONFIGURATION ======
server.port=8080
spring.application.name=finance-tracker

# ====== H2 DATABASE ======
spring.datasource.url=jdbc:h2:mem:financedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console - truy c?p t?i http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ====== JPA / HIBERNATE ======
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ====== EXCHANGERATE API ======
exchangerate.api.key=YOUR_API_KEY_HERE
exchangerate.api.base-url=https://v6.exchangerate-api.com/v6

# ====== LOGGING ======
logging.level.root=WARN
logging.level.com.TTCS26.financeTracker=INFO
logging.level.org.springframework.web=INFO